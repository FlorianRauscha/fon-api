name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  check:
    name: typecheck · lint · test · build
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Install xmllint (libxml2-utils) for XSD-conformance tests
        run: sudo apt-get update && sudo apt-get install -y libxml2-utils

      - run: npm run lint
      - run: npm run typecheck
      - run: npm test
      - run: npm run build
